<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonsai Local Chat v1.0.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column}
header{padding:20px 28px 16px;border-bottom:1px solid #1a1a2e;flex-shrink:0}
.lbl{font-size:10px;letter-spacing:.3em;color:#ff6b35;text-transform:uppercase;margin-bottom:4px}
h1{font-size:22px;font-weight:bold;color:#fff}
.bar{width:36px;height:2px;background:#ff6b35;margin-top:10px}
.subhead{margin-top:10px;font-size:11px;color:#a9a9bc;line-height:1.6}
.credit{margin-top:4px;font-size:10px;color:#7c7c92;line-height:1.5;letter-spacing:.08em;text-transform:uppercase}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#555;margin-left:10px;vertical-align:middle;transition:background .3s}
.status-dot.on{background:#4ecdc4}
.status-dot.warm{background:#ffb347}
.status-dot.sleep{background:#666}
.status-dot.err{background:#ff4444}

#messages{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:#0a0a0f}
#messages::-webkit-scrollbar-thumb{background:#1a1a2e}

.msg{max-width:80%;padding:10px 14px;border-radius:2px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#1a1a2e;color:#e8e8f0;border-left:2px solid #ff6b35}
.msg.assistant{align-self:flex-start;background:#080810;color:#c8c8e0;border-left:2px solid #2a2a4e}
.msg.assistant.streaming{border-left-color:#ff6b35}
.msg .role{font-size:9px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:5px;color:#444}
.msg.user .role{color:#ff6b35}
.msg.assistant .role{color:#2a4a4e}

.cursor{display:inline-block;width:8px;height:13px;background:#ff6b35;animation:blink .7s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

footer{padding:14px 28px 18px;border-top:1px solid #1a1a2e;flex-shrink:0}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:10px}
.field label{display:block;font-size:10px;letter-spacing:.2em;color:#444;text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;background:#080810;color:#c8c8e0;border:1px solid #1a1a2e;padding:8px 10px;font-family:'Courier New',monospace;font-size:11px;outline:none}
.field input:focus{border-color:#333}
.button-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.btn{background:#11111a;color:#d0d0de;border:1px solid #24243a;padding:9px 12px;font-family:'Courier New',monospace;font-size:10px;font-weight:bold;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.btn:hover{background:#151522;border-color:#ff6b35;color:#fff}
.btn.primary{background:#ff6b35;color:#000;border-color:#ff6b35}
.btn.primary:hover{background:#ff8550}
.btn.warn{border-color:#ff6b35;color:#ffb38d}
.btn:disabled{background:#2a2a2a;color:#555;border-color:#2a2a2a;cursor:default}
.runtime{font-size:11px;color:#9a9ab0;line-height:1.6;margin-bottom:8px;min-height:18px}
.model-status{font-size:11px;color:#ffd0bd;line-height:1.6;min-height:18px;margin-bottom:8px}
#err{font-size:11px;color:#ff4444;margin-bottom:8px;min-height:16px}

.results{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:180px;overflow:auto}
.result{background:#080810;border:1px solid #1a1a2e;padding:10px 12px}
.result-title{font-size:12px;color:#fff;word-break:break-word}
.result-meta{font-size:10px;color:#8f8fa8;line-height:1.5;margin-top:4px}
.result-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

.input-row{display:flex;gap:10px;align-items:flex-end}
#prompt{flex:1;background:#080810;color:#e8e8f0;border:1px solid #1a1a2e;padding:10px 14px;font-family:'Courier New',monospace;font-size:13px;line-height:1.5;resize:none;outline:none;min-height:42px;max-height:160px;overflow-y:auto}
#prompt:focus{border-color:#2a2a4e}
#send{background:#ff6b35;color:#000;border:none;padding:10px 20px;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;white-space:nowrap;height:42px;transition:background .15s}
#send:hover{background:#ff8550}
#send:disabled{background:#2a2a2a;color:#555;cursor:default}
.hint{font-size:10px;color:#2a2a3e;margin-top:7px;letter-spacing:.05em}

@media (max-width:720px){
  header,footer,#messages{padding-left:16px;padding-right:16px}
  .msg{max-width:92%}
  .input-row{align-items:stretch;flex-direction:column}
  #send{width:100%}
}
</style>
</head>
<body>

<header>
  <div class="lbl">Local MLX Chat</div>
  <h1>BONSAI <span class="status-dot sleep" id="dot" title="server status"></span></h1>
  <div class="bar"></div>
  <div class="subhead" id="subhead">Current model: loading...</div>
  <div class="credit" id="creditLine">Version 1.0.0 · Nikša Barlović + Codex</div>
</header>

<div id="messages"></div>

<footer>
  <div class="settings-grid">
    <div class="field">
      <label for="serverUrl">Server</label>
      <input id="serverUrl" value="http://localhost:8080" placeholder="http://localhost:8080">
    </div>
    <div class="field">
      <label for="modelInput">Model</label>
      <input id="modelInput" placeholder="prism-ml/Ternary-Bonsai-8B-mlx-2bit">
    </div>
    <div class="field">
      <label for="idleInput">Idle Sleep (sec)</label>
      <input id="idleInput" type="number" min="0" step="30" value="300">
    </div>
  </div>

  <div class="button-row">
    <button class="btn primary" id="applyBtn" onclick="applyModel()">APPLY MODEL</button>
    <button class="btn" id="checkBtn" onclick="checkModelOnline()">CHECK ONLINE</button>
    <button class="btn warn" id="downloadBtn" onclick="downloadAndApply()" style="display:none">DOWNLOAD & APPLY</button>
    <button class="btn" onclick="clearChat()">CLEAR CHAT</button>
  </div>

  <div class="runtime" id="runtimeInfo"></div>
  <div class="model-status" id="modelStatus"></div>
  <div id="err"></div>
  <div class="results" id="searchResults"></div>

  <div class="input-row">
    <textarea id="prompt" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()">SEND</button>
  </div>
  <div class="hint">Enter = send · Shift+Enter = newline</div>
</footer>

<script>
const history = [];
let streaming = false;
let appConfig = null;
let lastModelInfo = null;
const params = new URLSearchParams(window.location.search);
let demoApplied = false;

function isDemoMode() {
  return params.get('demo') === '1';
}

function demoPrompt() {
  return params.get('demoPrompt') || 'Give me a quick intro to Bonsai Chat.';
}

function demoReply() {
  return params.get('demoReply') || "Hi there! I'm Bonsai Chat for macOS.\nI can switch local MLX models and wake on demand.\nI also check Hugging Face before downloading a new model.";
}

function apiBase() {
  return document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
}

async function getJson(url, options = {}) {
  const response = await fetch(url, options);
  const text = await response.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch {}
  if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
  return data;
}

function setError(message = '') {
  document.getElementById('err').textContent = message;
}

function setModelStatus(message = '') {
  document.getElementById('modelStatus').textContent = message;
}

function formatDuration(totalSeconds) {
  const seconds = Math.max(0, Number(totalSeconds) || 0);
  const minutes = Math.floor(seconds / 60);
  const rem = seconds % 60;
  if (minutes <= 0) return `${rem}s`;
  return `${minutes}m ${String(rem).padStart(2, '0')}s`;
}

function setDot(status) {
  const dot = document.getElementById('dot');
  if (status === 'running') dot.className = 'status-dot on';
  else if (status === 'starting') dot.className = 'status-dot warm';
  else if (status === 'sleeping' || status === 'stopped') dot.className = 'status-dot sleep';
  else dot.className = 'status-dot err';
}

function syncConfig(config) {
  appConfig = config;
  document.getElementById('modelInput').value = config.model || '';
  document.getElementById('idleInput').value = config.idle_timeout_seconds ?? 300;
  document.getElementById('subhead').textContent = `Current model: ${config.active_model || config.model || 'n/a'}`;
  document.getElementById('creditLine').textContent = `Version ${config.app_version || '1.0.0'} · ${config.app_signature || 'Nikša Barlović + Codex'}`;
  setDot(config.mlx_status);

  let runtime = `MLX: ${config.mlx_status}`;
  if (config.idle_seconds_remaining != null) {
    runtime += ` · sleeps in ${formatDuration(config.idle_seconds_remaining)}`;
  } else if ((config.idle_timeout_seconds || 0) > 0) {
    runtime += ` · idle sleep ${formatDuration(config.idle_timeout_seconds)}`;
  } else {
    runtime += ' · idle sleep disabled';
  }
  if (config.resolved_mlx_command) runtime += ` · ${config.resolved_mlx_command}`;
  document.getElementById('runtimeInfo').textContent = runtime;

  if (config.last_error) setError(config.last_error);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
}

function addMsg(role, content, streamingMsg = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}${streamingMsg ? ' streaming' : ''}`;
  div.innerHTML = `<div class="role">${role === 'user' ? 'YOU' : 'BONSAI'}</div><span class="content"></span>`;
  div.querySelector('.content').textContent = content;
  if (streamingMsg) div.querySelector('.content').insertAdjacentHTML('afterend', '<span class="cursor"></span>');
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const messages = document.getElementById('messages');
  messages.scrollTop = messages.scrollHeight;
}

function clearChat() {
  history.length = 0;
  document.getElementById('messages').innerHTML = '';
  setError('');
}

function clearResults() {
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('downloadBtn').style.display = 'none';
  lastModelInfo = null;
}

function setBusyButtons(busy) {
  document.getElementById('applyBtn').disabled = busy;
  document.getElementById('checkBtn').disabled = busy;
  document.getElementById('downloadBtn').disabled = busy;
}

function renderExactMatch(info) {
  const wrap = document.getElementById('searchResults');
  wrap.innerHTML = '';

  const box = document.createElement('div');
  box.className = 'result';

  const title = document.createElement('div');
  title.className = 'result-title';
  title.textContent = info.id;
  box.appendChild(title);

  const meta = document.createElement('div');
  meta.className = 'result-meta';
  if (info.kind === 'local') {
    meta.textContent = 'Local model path found.';
  } else if (info.local_available) {
    meta.textContent = 'Found online and already present in the local cache.';
  } else {
    meta.textContent = 'Found online but not present in the local cache yet.';
  }
  box.appendChild(meta);

  const actions = document.createElement('div');
  actions.className = 'result-actions';

  const useBtn = document.createElement('button');
  useBtn.className = 'btn';
  useBtn.textContent = 'USE THIS';
  useBtn.onclick = () => { document.getElementById('modelInput').value = info.id; };
  actions.appendChild(useBtn);

  if (info.download_required) {
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn warn';
    dlBtn.textContent = 'DOWNLOAD & APPLY';
    dlBtn.onclick = downloadAndApply;
    actions.appendChild(dlBtn);
    document.getElementById('downloadBtn').style.display = 'inline-block';
  } else {
    document.getElementById('downloadBtn').style.display = 'none';
  }

  box.appendChild(actions);
  wrap.appendChild(box);
}

function renderSearchResults(results) {
  const wrap = document.getElementById('searchResults');
  wrap.innerHTML = '';
  document.getElementById('downloadBtn').style.display = 'none';

  if (!results.length) return;

  results.forEach((result) => {
    const box = document.createElement('div');
    box.className = 'result';

    const title = document.createElement('div');
    title.className = 'result-title';
    title.textContent = result.id;
    box.appendChild(title);

    const meta = document.createElement('div');
    meta.className = 'result-meta';
    const parts = [];
    if (result.downloads != null) parts.push(`downloads ${result.downloads}`);
    if (result.likes != null) parts.push(`likes ${result.likes}`);
    if (result.pipeline_tag) parts.push(result.pipeline_tag);
    meta.textContent = parts.join(' · ') || 'Online result';
    box.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'result-actions';

    const inspectBtn = document.createElement('button');
    inspectBtn.className = 'btn';
    inspectBtn.textContent = 'CHECK THIS';
    inspectBtn.onclick = async () => {
      document.getElementById('modelInput').value = result.id;
      await checkModelOnline();
    };
    actions.appendChild(inspectBtn);

    box.appendChild(actions);
    wrap.appendChild(box);
  });
}

function applyDemoState() {
  if (!isDemoMode() || demoApplied) return;
  demoApplied = true;

  const model = (appConfig && appConfig.active_model) || (appConfig && appConfig.model) || 'prism-ml/Ternary-Bonsai-8B-mlx-2bit';
  document.getElementById('modelInput').value = model;

  const prompt = demoPrompt();
  const reply = demoReply();

  history.length = 0;
  document.getElementById('messages').innerHTML = '';
  addMsg('user', prompt);
  addMsg('assistant', reply);
  history.push({role: 'user', content: prompt});
  history.push({role: 'assistant', content: reply});

  setError('');
  setModelStatus('');
  if (!appConfig) {
    document.getElementById('subhead').textContent = `Current model: ${model}`;
    document.getElementById('creditLine').textContent = 'Version 1.0.0 · Nikša Barlović + Codex';
    document.getElementById('runtimeInfo').textContent = 'MLX: running · demo mode preview';
    setDot('running');
  }
}

async function loadConfig() {
  try {
    const config = await getJson(apiBase() + '/bonsai/config');
    syncConfig(config);
    applyDemoState();
  } catch (error) {
    if (isDemoMode()) {
      applyDemoState();
    } else {
      setDot('error');
      setError(error.message || 'Could not load config');
    }
  }
}

async function applyModel() {
  const model = document.getElementById('modelInput').value.trim();
  const idleTimeout = Number(document.getElementById('idleInput').value || 0);

  if (!model) {
    setError('Model is required.');
    return;
  }

  setError('');
  setModelStatus('Applying model...');
  setBusyButtons(true);

  try {
    const config = await getJson(apiBase() + '/bonsai/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model,
        idle_timeout_seconds: idleTimeout,
        apply: true
      })
    });

    syncConfig(config);
    clearResults();
    clearChat();
    setModelStatus(`Active model: ${config.active_model}. Chat reset for the new model.`);
  } catch (error) {
    setError(error.message || 'Could not apply model.');
    setModelStatus('');
  } finally {
    setBusyButtons(false);
    document.getElementById('prompt').focus();
  }
}

async function downloadAndApply() {
  const model = document.getElementById('modelInput').value.trim();
  if (!model) {
    setError('Model is required.');
    return;
  }
  setModelStatus(`Downloading '${model}' if needed, then applying it...`);
  await applyModel();
}

async function checkModelOnline() {
  const model = document.getElementById('modelInput').value.trim();
  if (!model) {
    setError('Enter a model name first.');
    return;
  }

  setError('');
  setModelStatus(`Checking '${model}' online...`);
  setBusyButtons(true);

  try {
    const info = await getJson(apiBase() + '/bonsai/model-info?model=' + encodeURIComponent(model));
    lastModelInfo = info;
    renderExactMatch(info);
    if (info.download_required) {
      setModelStatus(`Model exists online, but is not cached locally. Download is available.`);
    } else if (info.kind === 'local') {
      setModelStatus('Local model path found and ready.');
    } else {
      setModelStatus('Model is available and already cached locally.');
    }
  } catch (exactError) {
    try {
      const payload = await getJson(apiBase() + '/bonsai/search-models?q=' + encodeURIComponent(model));
      renderSearchResults(payload.results || []);
      if ((payload.results || []).length) {
        setModelStatus('No exact match found. Similar online models are listed below.');
      } else {
        setModelStatus('No matching online models found.');
      }
    } catch (searchError) {
      setError(searchError.message || exactError.message || 'Online check failed.');
      setModelStatus('');
    }
  } finally {
    setBusyButtons(false);
  }
}

async function sendMessage() {
  if (streaming) return;

  const textarea = document.getElementById('prompt');
  const text = textarea.value.trim();
  if (!text) return;

  setError('');
  textarea.value = '';
  textarea.style.height = 'auto';

  addMsg('user', text);
  history.push({role: 'user', content: text});

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true;
  streaming = true;

  const msgEl = addMsg('assistant', '', true);
  const contentEl = msgEl.querySelector('.content');
  const cursor = msgEl.querySelector('.cursor');
  let full = '';

  try {
    const response = await fetch(apiBase() + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: (appConfig && appConfig.active_model) || document.getElementById('modelInput').value.trim(),
        messages: history,
        stream: true,
        max_tokens: 1024,
        temperature: 0.7
      })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices && json.choices[0] && json.choices[0].delta ? (json.choices[0].delta.content || '') : '';
          full += delta;
          contentEl.textContent = full;
          scrollBottom();
        } catch {}
      }
    }

    msgEl.classList.remove('streaming');
    if (cursor) cursor.remove();
    history.push({role: 'assistant', content: full});
    await loadConfig();
  } catch (error) {
    msgEl.classList.remove('streaming');
    if (cursor) cursor.remove();
    contentEl.textContent = full || '(no response)';
    setError(error.message || 'Connection failed.');
    if (!full) history.pop();
    await loadConfig();
  }

  streaming = false;
  sendBtn.disabled = false;
  textarea.focus();
}

const requestedServer = params.get('server');
const requestedModel = params.get('model');
if (requestedServer) document.getElementById('serverUrl').value = requestedServer;
if (requestedModel) document.getElementById('modelInput').value = requestedModel;

loadConfig();
if (!isDemoMode()) setInterval(loadConfig, 5000);
document.getElementById('prompt').focus();
</script>
</body>
</html>
